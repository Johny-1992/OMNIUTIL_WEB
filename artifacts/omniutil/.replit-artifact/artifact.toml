kind = "web"
previewPath = "/"
title = "OmniUtil"
version = "1.0.0"
id = "artifacts/omniutil"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19759

[services.development]
run = "pnpm --filter @workspace/omniutil run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/omniutil", "run", "build" ]
publicDir = "artifacts/omniutil/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19759"
BASE_PATH = "/"
